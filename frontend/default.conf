##
## @file default.conf
## @description Configuracion del servidor Nginx para el frontend Angular de SAFI-NGAC.
##              Sirve los archivos estaticos compilados en el puerto estandarizado 8080
##              del contenedor. Actua como proxy inverso para las rutas /api/ apuntando
##              al contenedor safi-ngac-backend en su puerto interno 3200.
## @author IA Assistant
## @date 2026-06-10
## @version 1.1.0
##
## HISTORIAL DE CAMBIOS:
## -----------------------------------------------------------------------------------------
## FECHA        | AUTOR             | VERSION   | DESCRIPCION DEL CAMBIO
## -----------------------------------------------------------------------------------------
## 2026-06-04   | Gerardo Paiva     | 1.0.0     | Creacion inicial.
## 2026-06-10   | IA Assistant      | 1.1.0     | Puerto estandarizado de 80 a 8080.
##              |                   |           | Proxy apunta a nombre de contenedor.
## -----------------------------------------------------------------------------------------

server {
  listen 8080;
  root /usr/share/nginx/html;
  index index.html;

  location /api/ {
    proxy_pass http://safi-ngac-backend:3200;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }

  location = /favicon.ico {
    log_not_found off;
    access_log off;
  }
}
