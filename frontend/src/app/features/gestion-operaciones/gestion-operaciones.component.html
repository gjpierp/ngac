<div class="animate-in fade-in duration-1000 flex flex-col h-full max-w-7xl mx-auto py-6 px-4 sm:px-6 lg:px-8">
  <!-- CABECERA PRINCIPAL PREMIUM -->
  <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8 border-b border-slate-100 pb-6">
    <div class="space-y-1">
      <div class="flex items-center gap-2">
        <h1 class="text-3xl font-black text-slate-800 tracking-tight">
          Catálogo de <span class="bg-gradient-to-r from-blue-650 to-indigo-650 bg-clip-text text-transparent">Operaciones</span>
        </h1>
        <span class="bg-blue-100/80 text-blue-700 text-[10px] font-black uppercase tracking-wider px-2.5 py-1 rounded-full border border-blue-200">
          {{ operaciones().length }} Totales
        </span>
      </div>
      <p class="text-slate-500 text-xs font-medium flex items-center gap-1.5">
        <span class="w-1.5 h-1.5 rounded-full bg-blue-500 animate-pulse"></span>
        Definición y registro de las acciones y operaciones permitidas en el motor de seguridad NGAC
      </p>
    </div>
    
    <div class="flex items-center gap-3">
      <!-- BOTÓN CREAR -->
      <button (click)="openDialog()" 
              class="h-11 px-5 rounded-2xl bg-indigo-50 hover:bg-indigo-100 text-indigo-700 hover:text-indigo-800 border border-indigo-200/60 flex items-center gap-2 font-bold text-xs uppercase tracking-wider transition-all hover:scale-[1.02] active:scale-95 shadow-sm"
              matTooltip="Nueva Operación">
        <mat-icon class="!w-5 !h-5 !text-xl">add_circle</mat-icon>
        <span>Nueva Operación</span>
      </button>
    </div>
  </div>

  <!-- CONTENIDO DE TABLA PREMIUM -->
  <div class="bg-white border border-slate-100 rounded-[32px] shadow-xl shadow-slate-100/50 overflow-hidden p-8">
    <div class="mb-4 pb-4 border-b border-slate-50">
      <h3 class="font-black text-slate-800 text-sm flex items-center gap-2">
        <mat-icon class="text-indigo-500">list_alt</mat-icon>
        Operaciones Registradas en el Motor NGAC
      </h3>
    </div>
    <app-tabla-generica
      [data]="operaciones()"
      [columns]="columns"
      (onEdit)="editOp($event)"
      (onDelete)="deleteOp($event)">
    </app-tabla-generica>
  </div>
</div>
