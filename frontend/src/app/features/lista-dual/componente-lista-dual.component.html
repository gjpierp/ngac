<div class="dual-listbox grid grid-cols-3 gap-4 items-center">
  <div>
    <h3 class="font-bold mb-2">{{ titleLeft }}</h3>
    <ul class="bg-white rounded-lg border border-gray-200 max-h-80 overflow-y-auto">
      <li
        *ngFor="let item of available"
        class="flex items-center px-3 py-2 cursor-pointer hover:bg-blue-50"
        [class.bg-blue-100]="availableSelected.has(item.id)"
        (click)="
          availableSelected.has(item.id)
            ? availableSelected.delete(item.id)
            : availableSelected.add(item.id)
        "
      >
        <mat-icon *ngIf="availableSelected.has(item.id)" color="primary">check</mat-icon>
        <span class="ml-2">{{ item.label }}</span>
      </li>
    </ul>
  </div>
  <div class="flex flex-col items-center gap-2">
    <button
      mat-icon-button
      color="primary"
      (click)="moveAllToSelected()"
      [disabled]="!available.length"
      matTooltip="Mover todos"
    >
      <mat-icon>keyboard_double_arrow_right</mat-icon>
    </button>
    <button
      mat-icon-button
      color="primary"
      (click)="moveToSelected()"
      [disabled]="!availableSelected.size"
      matTooltip="Mover seleccionados"
    >
      <mat-icon>chevron_right</mat-icon>
    </button>
    <button
      mat-icon-button
      color="warn"
      (click)="moveToAvailable()"
      [disabled]="!selectedSelected.size"
      matTooltip="Regresar seleccionados"
    >
      <mat-icon>chevron_left</mat-icon>
    </button>
    <button
      mat-icon-button
      color="warn"
      (click)="moveAllToAvailable()"
      [disabled]="!selected.length"
      matTooltip="Regresar todos"
    >
      <mat-icon>keyboard_double_arrow_left</mat-icon>
    </button>
  </div>
  <div>
    <h3 class="font-bold mb-2">{{ titleRight }}</h3>
    <ul class="bg-white rounded-lg border border-gray-200 max-h-80 overflow-y-auto">
      <li
        *ngFor="let item of selected"
        class="flex items-center px-3 py-2 cursor-pointer hover:bg-blue-50"
        [class.bg-blue-100]="selectedSelected.has(item.id)"
        (click)="
          selectedSelected.has(item.id)
            ? selectedSelected.delete(item.id)
            : selectedSelected.add(item.id)
        "
      >
        <mat-icon *ngIf="selectedSelected.has(item.id)" color="primary">check</mat-icon>
        <span class="ml-2">{{ item.label }}</span>
      </li>
    </ul>
  </div>
</div>
