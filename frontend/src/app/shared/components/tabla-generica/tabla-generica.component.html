<div class="table-container mat-elevation-z8 bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
  
  <!-- Buscador Superior -->
  <div class="p-6 border-b border-gray-50 bg-gray-50/30">
    <mat-form-field appearance="outline" class="w-full !mb-0">
      <mat-label>Buscar en la tabla</mat-label>
      <input matInput (keyup)="applyFilter($event)" placeholder="Escribe para filtrar resultados..." #input>
      <mat-icon matSuffix class="material-icons text-gray-400">search</mat-icon>
    </mat-form-field>
  </div>

  <!-- Tabla -->
  <div class="overflow-x-auto">
    <table mat-table [dataSource]="dataSource" matSort class="w-full">
      
      <ng-container *ngFor="let col of columns" [matColumnDef]="col.key">
        <th mat-header-cell *matHeaderCellDef mat-sort-header class="bg-white py-4 px-6 text-xs font-bold text-gray-400 uppercase tracking-widest border-b border-gray-50"> 
          {{col.header}} 
        </th>
        
        <td mat-cell *matCellDef="let element" class="py-4 px-6 border-b border-gray-50"> 
          
          <!-- Contenido de Texto Estándar (Con Soporte Jerárquico) -->
          <ng-container *ngIf="col.type !== 'action' && col.type !== 'boolean'">
            <div class="flex items-center gap-2" [style.padding-left.px]="col.key === columns[0].key ? (element.level * 20) : 0">
              <!-- Botón de Expansión (Solo en la primera columna si tiene hijos) -->
              <button *ngIf="col.key === columns[0].key && element.hasChildren" 
                      mat-icon-button class="!w-6 !h-6 !leading-none shrink-0" 
                      (click)="onToggle.emit(element); $event.stopPropagation()">
                <mat-icon class="!text-[14px] transition-transform duration-200" 
                          [class.rotate-90]="isExpanded?.(element.codigo_tecnico)">
                  chevron_right
                </mat-icon>
              </button>
              <div *ngIf="col.key === columns[0].key && !element.hasChildren && element.level > 0" class="w-6 h-6 shrink-0"></div>
              
              <span class="text-sm text-gray-700 font-medium truncate">{{element[col.key]}}</span>
            </div>
          </ng-container>

          <!-- Contenido Booleano / Estado -->
          <ng-container *ngIf="col.type === 'boolean'">
            <span class="px-2 py-1 rounded-full text-[10px] font-bold uppercase tracking-tight"
                  [ngClass]="element[col.key] ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-500'">
              {{element[col.key] ? 'Activo' : 'Inactivo'}}
            </span>
          </ng-container>

          <!-- Columna de Acciones -->
          <ng-container *ngIf="col.type === 'action'">
            <div class="flex items-center gap-1">
              <button mat-icon-button class="!text-blue-500 hover:bg-blue-50 transition-colors" 
                      (click)="onEdit.emit(element)" title="Editar">
                <mat-icon class="material-icons">edit</mat-icon>
              </button>
              <button mat-icon-button class="!text-red-500 hover:bg-red-50 transition-colors" 
                      (click)="onDelete.emit(element)" title="Eliminar">
                <mat-icon class="material-icons">delete</mat-icon>
              </button>
            </div>
          </ng-container>

        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;" 
          (click)="onRowClick.emit(row)"
          class="hover:bg-blue-50/30 transition-colors duration-150 cursor-pointer"></tr>

      <!-- Estado Vacío -->
      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell p-12 text-center" [attr.colspan]="columns.length">
          <div class="flex flex-col items-center gap-3 text-gray-400">
            <mat-icon class="material-icons text-5xl opacity-20">search_off</mat-icon>
            <p class="text-sm font-medium">No se encontraron datos que coincidan con "{{input.value}}"</p>
          </div>
        </td>
      </tr>
    </table>
  </div>

  <!-- Paginación -->
  <div class="bg-gray-50/50 border-t border-gray-50">
    <mat-paginator [pageSizeOptions]="[5, 10, 25, 100]" 
                   class="!bg-transparent"
                   aria-label="Seleccionar página"></mat-paginator>
  </div>
</div>
