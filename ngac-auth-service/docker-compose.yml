version: '3.8'

# ─────────────────────────────────────────────────────────────────────────────
# SAFI-NGAC — Ecosistema completo
#
# Carpetas del proyecto:
#   auth-service/   → Motor de menú NGAC (este archivo vive aquí)
#   backend/        → Admin CRUD + jerarquía
#   frontend/       → Angular + Nginx
#   gateway/        → API Gateway (no presente localmente, se usa imagen pre-construida)
#
# Servicios Docker:
#   ngac-db           → Oracle XE 21c           (interno :1521)
#   ngac-auth-service → Motor de menú NGAC       (interno :3100)
#   ngac-backend      → Admin CRUD / jerarquía   (interno :3200)
#   ngac-frontend     → Angular + Nginx          (interno :80)
#   ngac-gateway      → API Gateway (entry-point) (expuesto :8080)
#
# Punto de entrada único Docker: http://localhost:3210
#   /api/v1/menu   → ngac-auth-service
#   /api/v1/admin  → ngac-backend
#   /*             → ngac-frontend
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── 1. Base de Datos Oracle ────────────────────────────────────────────────
  ngac-db:
    image: gvenzl/oracle-xe:21.3.0-slim
    container_name: ngac-db
    ports:
      - "1521:1521"         # Expuesto para desarrollo local / SQL*Plus
    environment:
      ORACLE_PASSWORD:      G3rC4t_01
      APP_USER:             ngac_user
      APP_USER_PASSWORD:    G3rC4t_01
    healthcheck:
      test: ["CMD-SHELL", "echo exit | sqlplus -S ngac_user/G3rC4t_01@localhost/XEPDB1"]
      interval: 30s
      timeout: 10s
      retries: 12
    volumes:
      - oracle-data:/opt/oracle/oradata
      - ./script:/scripts
    restart: unless-stopped
    networks:
      - global-network

  # ── 2. Auth Service (Motor de menú NGAC) ──────────────────────────────────
  ngac-auth-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ngac-auth-service
    env_file: .env
    environment:
      - DB_USER=ngac_user
      - DB_PASSWORD=G3rC4t_01
      - DB_CONNECTION_STRING=ngac-db:1521/XEPDB1
      - EUREKA_HOST=eureka-server
      - EUREKA_PORT=8761
    expose:
      - "3100"              # Sólo interno — el gateway lo expone
    depends_on:
      ngac-db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - global-network

  # ── 3. Admin Backend (CRUD + Jerarquía) ───────────────────────────────────
  ngac-backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: ngac-backend
    environment:
      - PORT=${NGAC_BACKEND_CONTAINER_PORT:-3200}
      - DB_USER=ngac_user
      - DB_PASSWORD=G3rC4t_01
      - DB_CONNECTION_STRING=ngac-db:1521/XEPDB1
      - EUREKA_HOST=eureka-server
      - EUREKA_PORT=8761
    expose:
      - "${NGAC_BACKEND_CONTAINER_PORT:-3200}"              # Sólo interno
    ports:
      - "${NGAC_BACKEND_HOST_PORT:-3215}:${NGAC_BACKEND_CONTAINER_PORT:-3200}"
    volumes:
      - ../backend/src:/usr/src/app/src
    command: npm run dev
    depends_on:
      ngac-db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - global-network

  # ── 4. Frontend (Angular build → Nginx) ────────────────────────────────────
  ngac-frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: ngac-frontend
    expose:
      - "80"
    depends_on:
      - ngac-auth-service
      - ngac-backend
    restart: unless-stopped
    networks:
      - global-network

  # ── 5. API Gateway (único punto de entrada) ────────────────────────────────
  ngac-gateway:
    image: ngac-auth-service-ngac-gateway:latest
    container_name: ngac-gateway
    ports:
      - "${NGAC_GATEWAY_HOST_PORT:-3210}:${NGAC_GATEWAY_CONTAINER_PORT:-8080}"
    environment:
      - PORT=${NGAC_GATEWAY_CONTAINER_PORT:-8080}
      - EUREKA_HOST=eureka-server
      - EUREKA_PORT=8761
      - AUTH_SERVICE_URL=http://ngac-auth-service:3100
      - BACKEND_SERVICE_URL=http://ngac-backend:${NGAC_BACKEND_CONTAINER_PORT:-3200}
      - FRONTEND_SERVICE_URL=http://ngac-frontend:80
    depends_on:
      - ngac-auth-service
      - ngac-backend
      - ngac-frontend
    restart: unless-stopped
    networks:
      - global-network

# ── Redes y Volúmenes persistentes ─────────────────────────────────────────────
networks:
  global-network:
    external: true

volumes:
  oracle-data:
    driver: local
